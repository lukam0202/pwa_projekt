<!DOCTYPE html>
<html lang="hr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" type="text/css" href="style.css">
</head>

<body>

    <header>
        <h1>Unity Game Engine Letter</h1>
        <nav>
            <ul>
                <li><a href="index.php">Home</a></li>
                <li><a href="kategorija.php?kategorija=Igre">Igre</a></li>
                <li><a href="kategorija.php?kategorija=Ucenje">Učenje</a></li>
                <li><a href="administracija.php">Administracija</a></li>
                <li><a href="unos.html">Unos</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <div class="naslov">
            <p>Dodaj novu vijest</p>
        </div>

        <form action="skripta.php" method="POST" enctype="multipart/form-data">
            <div class="form-item">
                <label for="naslov">Unesite naslov:</label><br>
                <input type="text" name="naslov" id="naslov"><br>
                <span id="porukaNaslov" class="error"></span>

                <label for="sazetak">Unesite sažetak:</label><br>
                <textarea name="sazetak" id="sazetak" rows="5" cols="30"></textarea><br>
                <span id="porukaSazetak" class="error"></span>

                <label for="tekst">Unesite tekst:</label><br>
                <textarea name="tekst" id="tekst" rows="5" cols="50"></textarea><br>
                <span id="porukaTekst" class="error"></span>


                <label for="slika">Dodajte sliku:</label><br>
                <input type="file" accept="image/jpeg,image/png,image/gif" name="slika" id="slika"><br>
                <span id="porukaImg" class="error"></span><br>

                <label for="kategorija">Odaberite kategoriju</label><br>
                <select id="kategorija" name="kategorija">
                    <option value="Igre">Igre</option>
                    <option value="Ucenje">Učenje</option>

                </select><br>
                <span id="porukaKategorija" class="error"></span><br>

                <div class="form-item">
                    <label>Spremiti u arhivu:</label>
                    <div class="form-field">
                        <input type="checkbox" name="archive">
                    </div>
                </div>
                <div class="form-item">
                    <button type="reset" value="Poništi">Poništi</button>
                    <button type="submit" id="slanje" value="Prihvati">Prihvati</button>
                </div>
            </div>
        </form>

        <script type="text/javascript">
            document.getElementById("slanje").onclick = function (event) {

                var slanjeForme = true;

                var poljeNaslov = document.getElementById("naslov");
                if (poljeNaslov.value.trim().length == 0) {
                    slanjeForme = false;
                    poljeNaslov.style.border = "1px dashed red";
                    document.getElementById("porukaNaslov").innerHTML = "Unesite naslov!";
                } else {
                    poljeNaslov.style.border = "1px solid green";
                    document.getElementById("porukaNaslov").innerHTML = "";
                }

                var poljeSazetak = document.getElementById("sazetak");
                if (poljeSazetak.value.trim().length == 0) {
                    slanjeForme = false;
                    poljeSazetak.style.border = "1px dashed red";
                    document.getElementById("porukaSazetak").innerHTML = "Unesite sažetak!";
                } else {
                    poljeSazetak.style.border = "1px solid green";
                    document.getElementById("porukaSazetak").innerHTML = "";
                }

                var poljeTekst = document.getElementById("tekst");
                if (poljeTekst.value.trim().length == 0) {
                    slanjeForme = false;
                    poljeTekst.style.border = "1px dashed red";
                    document.getElementById("porukaTekst").innerHTML = "Unesite tekst!";
                } else {
                    poljeTekst.style.border = "1px solid green";
                    document.getElementById("porukaTekst").innerHTML = "";
                }

                var poljeSlika = document.getElementById("slika");
                if (poljeSlika.value.length == 0) {
                    slanjeForme = false;
                    document.getElementById("porukaImg").innerHTML = "Odaberite sliku!";
                } else {
                    document.getElementById("porukaImg").innerHTML = "";
                }

                if (slanjeForme != true) {
                    event.preventDefault();
                }
            };
        </script>
    </main>

    <footer>
        <p>Luka Mikić</p>
        <p>luka.mikic@tvz.hr</p>
        <p>2026</p>
        <hr>
    </footer>
</body>

</html>
